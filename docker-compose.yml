services:
  db:
    image: postgres:16
    container_name: broccoli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: broccoli
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "1619:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d broccoli"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
    networks:
      - broccoli-network

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/broccoli
      # Set to "true" to skip seeding (useful for production migrations)
      SKIP_SEED: ${SKIP_SEED:-false}
    networks:
      - broccoli-network

volumes:
  postgres_data:

networks:
  broccoli-network:
    driver: bridge
